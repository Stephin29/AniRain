<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Countdown Begins</title>

<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="video-background">
    <video id="bg-video" autoplay muted loop playsinline>
        </video>
</div>


<div class="timer-container" id="countdown">
    <div class="title-wrapper">
        <div class="title title-echo">
            <span class="title-part-ani">ANI</span><span class="title-part-rain">RAIN</span>
        </div>
    
        <div class="title title-main">
            <span class="char title-part-ani" style="--i:1">A</span>
            <span class="char title-part-ani" style="--i:2">N</span>
            <span class="char title-part-ani" style="--i:3">I</span>
            <span class="char title-part-rain" style="--i:4">R</span>
            <span class="char title-part-rain" style="--i:5">A</span>
            <span class="char title-part-rain" style="--i:6">I</span>
            <span class="char title-part-rain" style="--i:7">N</span>
        </div>
    
        <div class="tagline">EVOLVING THE STREAMING EXPERIENCE</div>
    </div>
    <div class="timer">
        <div class="time-segment">
            <span class="time-value" id="days">00</span>
            <span class="time-label">Days</span>
        </div>
    
        <span class="separator">:</span>
    
        <div class="time-segment">
            <span class="time-value" id="hours">00</span>
            <span class="time-label">Hours</span>
        </div>
    
        <span class="separator">:</span>
    
        <div class="time-segment">
            <span class="time-value" id="minutes">00</span>
            <span class="time-label">Minutes</span>
        </div>
    
        <span class="separator">:</span>
    
        <div class="time-segment">
            <span class="time-value" id="seconds">00</span>
            <span class="time-label">Seconds</span>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
